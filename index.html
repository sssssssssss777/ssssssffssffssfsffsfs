<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Скейтинг система</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #e9ecef;
            margin: 0;
            padding: 16px;
            color: #1e2a3a;
        }
        .container {
            max-width: 100%;
            overflow-x: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px 24px;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0 0 20px 0;
            font-weight: 600;
            color: #1e4668;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            align-items: flex-end;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #4a627a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-group input {
            padding: 8px 12px;
            border-radius: 24px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            width: 100px;
            text-align: center;
            background: white;
            font-weight: 500;
        }
        button {
            background: #1f6392;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.1s;
        }
        button:active { transform: scale(0.96); background: #0f4a6e; }
        .calc-btn { background: #2b6a4c; }
        .calc-btn:hover { background: #1f553d; }
        .reset-btn { background: #8b5a2b; }
        .dance-nav {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 8px 20px;
            border-radius: 60px;
            width: fit-content;
        }
        .dance-btn {
            background: #4b7b9d;
            padding: 6px 20px;
            font-size: 0.9rem;
        }
        .dance-indicator {
            font-weight: 700;
            background: #1e4668;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: white;
            margin-bottom: 32px;
        }
        .skating-table {
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 500px;
        }
        .skating-table th {
            background: #1e4668;
            color: white;
            padding: 12px 8px;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }
        .skating-table td {
            border: 1px solid #dce5ec;
            padding: 6px 4px;
            text-align: center;
        }
        .skating-table input {
            width: 60px;
            padding: 8px 4px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: white;
            transition: 0.05s linear;
            font-family: monospace;
        }
        .skating-table input:focus {
            outline: none;
            border-color: #f59e0b;
            background: #fff9e6;
            box-shadow: 0 0 0 2px rgba(245,158,11,0.2);
        }
        .skating-table input.error-input {
            border-color: #dc2626;
            background: #fee2e2;
        }
        .pair-col {
            background: #f1f5f9;
            font-weight: 700;
            position: sticky;
            left: 0;
            background: #eef2ff;
            z-index: 5;
        }
        .results-area {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
        }
        .results-area h3 {
            margin: 0 0 16px 0;
            font-size: 1.2rem;
            color: #1e4668;
        }
        .results-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .results-list li {
            padding: 10px 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 1rem;
        }
        .results-list li strong {
            color: #1e4668;
            font-weight: 700;
            display: inline-block;
            width: 100px;
        }
        .error-message {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 8px;
            padding: 8px;
            background: #fee2e2;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Скейтинг система</h1>

    <div class="toolbar">
        <div class="control-group">
            <label>СУДЕЙ</label>
            <input type="number" id="judgesCount" min="1" max="50" value="5">
        </div>
        <div class="control-group">
            <label>ПАР</label>
            <input type="number" id="couplesCount" min="2" max="50" value="6">
        </div>
        <div class="control-group">
            <label>ТАНЦЕВ</label>
            <input type="number" id="dancesCount" min="1" max="12" value="4">
        </div>
        <button id="applyConfigBtn">Применить</button>
        <button id="resetAllScoresBtn" class="reset-btn">Сброс</button>
        <button id="calculateFinalBtn" class="calc-btn">Рассчитать места</button>
    </div>

    <div class="dance-nav">
        <button id="prevDanceBtn" class="dance-btn">Предыдущий</button>
        <span id="danceLabel" class="dance-indicator">Танец 1 / 4</span>
        <button id="nextDanceBtn" class="dance-btn">Следующий</button>
    </div>

    <div class="table-wrapper">
        <table class="skating-table" id="skatingTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        保持
    </div>
    <div id="errorMessage" class="error-message"></div>

    <div class="results-area">
        <h3>Итоговые места</h3>
        <div id="finalResultsList"></div>
    </div>
</div>

<script>
    let judges = 5;
    let couples = 6;
    let dances = 4;
    let currentDance = 0;
    let danceScores = [];
    
    const tbody = document.getElementById('tableBody');
    const thead = document.getElementById('tableHeader');
    const danceLabelSpan = document.getElementById('danceLabel');
    const finalResultsList = document.getElementById('finalResultsList');
    const errorMessageDiv = document.getElementById('errorMessage');
    
    function initDataStructure() {
        danceScores = [];
        for(let d = 0; d < dances; d++) {
            let dance = [];
            for(let p = 0; p < couples; p++) {
                dance.push(new Array(judges).fill(null));
            }
            danceScores.push(dance);
        }
    }
    
    function renderHeader() {
        let html = '<tr><th style="min-width: 80px;">№ пары \\ Судьи</th>';
        for(let j = 0; j < judges; j++) {
            html += `<th>Судья ${j+1}</th>`;
        }
        html += '</tr>';
        thead.innerHTML = html;
    }
    
    function renderTable() {
        if(!danceScores.length) return;
        let currentScores = danceScores[currentDance];
        let html = '';
        for(let p = 0; p < couples; p++) {
            html += `<tr data-pair="${p}">`;
            html += `<td class="pair-col" style="font-weight:700;">#${p+1}</td>`;
            for(let j = 0; j < judges; j++) {
                let val = currentScores[p][j];
                let displayVal = (val !== null && val !== undefined) ? val : '';
                html += `<td data-judge="${j}" data-pair="${p}">
                            <input type="text" 
                                   class="score-input" 
                                   data-pair="${p}" 
                                   data-judge="${j}"
                                   value="${displayVal}"
                                   autocomplete="off"
                                   inputmode="numeric">
                          </td>`;
            }
            html += `</tr>`;
        }
        tbody.innerHTML = html;
        danceLabelSpan.innerText = `Танец ${currentDance+1} / ${dances}`;
        attachInputEvents();
    }
    
    function validateAndGetValue(input, pairIdx, judgeIdx, newValue) {
        if(newValue === null || newValue === '') return null;
        
        let intVal = parseInt(newValue, 10);
        if(isNaN(intVal)) return null;
        
        if(intVal < 1 || intVal > couples) {
            showTemporaryError(`Место должно быть от 1 до ${couples}`);
            return null;
        }
        
        // Проверка на уникальность места у текущего судьи в текущем танце
        let currentJudgeScores = [];
        for(let p = 0; p < couples; p++) {
            let score = danceScores[currentDance][p][judgeIdx];
            if(score !== null && p !== pairIdx) {
                currentJudgeScores.push(score);
            }
        }
        
        if(currentJudgeScores.includes(intVal)) {
            showTemporaryError(`Судья ${judgeIdx + 1} уже поставил место ${intVal} другой паре. Каждое место можно использовать только один раз.`);
            return null;
        }
        
        return intVal;
    }
    
    function showTemporaryError(message) {
        errorMessageDiv.textContent = message;
        errorMessageDiv.style.display = 'block';
        setTimeout(() => {
            errorMessageDiv.style.display = 'none';
        }, 2500);
    }
    
    function attachInputEvents() {
        const inputs = document.querySelectorAll('.score-input');
        inputs.forEach(input => {
            input.removeEventListener('input', handleInputChange);
            input.addEventListener('input', handleInputChange);
        });
    }
    
    function handleInputChange(e) {
        const input = e.target;
        const pairIdx = parseInt(input.getAttribute('data-pair'));
        const judgeIdx = parseInt(input.getAttribute('data-judge'));
        let raw = input.value.trim();
        
        let validValue = validateAndGetValue(input, pairIdx, judgeIdx, raw);
        
        if(validValue !== null && raw !== '') {
            danceScores[currentDance][pairIdx][judgeIdx] = validValue;
            input.value = validValue;
            input.classList.remove('error-input');
            autoNavigateColumnWise(pairIdx, judgeIdx);
        } else if(raw === '') {
            danceScores[currentDance][pairIdx][judgeIdx] = null;
            input.classList.remove('error-input');
        } else {
            input.classList.add('error-input');
            setTimeout(() => input.classList.remove('error-input'), 1000);
        }
    }
    
    function autoNavigateColumnWise(currentPair, currentJudge) {
        for(let p = currentPair + 1; p < couples; p++) {
            if(danceScores[currentDance][p][currentJudge] === null) {
                focusInput(p, currentJudge);
                return;
            }
        }
        
        for(let j = currentJudge + 1; j < judges; j++) {
            for(let p = 0; p < couples; p++) {
                if(danceScores[currentDance][p][j] === null) {
                    focusInput(p, j);
                    return;
                }
            }
        }
        
        let allFull = true;
        for(let p = 0; p < couples; p++) {
            for(let j = 0; j < judges; j++) {
                if(danceScores[currentDance][p][j] === null) {
                    allFull = false;
                    break;
                }
            }
            if(!allFull) break;
        }
        
        if(allFull && currentDance + 1 < dances) {
            currentDance++;
            renderTable();
            setTimeout(() => {
                for(let j = 0; j < judges; j++) {
                    for(let p = 0; p < couples; p++) {
                        if(danceScores[currentDance][p][j] === null) {
                            focusInput(p, j);
                            return;
                        }
                    }
                }
            }, 30);
        }
    }
    
    function focusInput(pairIdx, judgeIdx) {
        const selector = `input.score-input[data-pair='${pairIdx}'][data-judge='${judgeIdx}']`;
        const targetInput = document.querySelector(selector);
        if(targetInput) {
            targetInput.focus();
            targetInput.select();
            targetInput.style.backgroundColor = '#fff3cf';
            setTimeout(() => { if(targetInput) targetInput.style.backgroundColor = ''; }, 150);
        }
    }
    
    function computeSingleDancePlaces(danceIdx) {
        let judgeMarks = Array(judges).fill().map(() => Array(couples).fill(null));
        for(let p = 0; p < couples; p++) {
            for(let j = 0; j < judges; j++) {
                let mark = danceScores[danceIdx][p][j];
                judgeMarks[j][p] = (mark !== null) ? mark : null;
            }
        }
        
        let places = new Array(couples).fill(null);
        let remaining = [...Array(couples).keys()];
        let currentRank = 1;
        let neededMajority = Math.floor(judges / 2) + 1;
        
        while(remaining.length > 0 && currentRank <= couples) {
            let candidates = [];
            
            for(let p of remaining) {
                let countBetter = 0;
                let sumComponents = 0;
                for(let j = 0; j < judges; j++) {
                    let mark = judgeMarks[j][p];
                    if(mark !== null && mark <= currentRank) {
                        countBetter++;
                        sumComponents += mark;
                    }
                }
                if(countBetter >= neededMajority) {
                    candidates.push({ pair: p, count: countBetter, sum: sumComponents });
                }
            }
            
            if(candidates.length === 0) {
                currentRank++;
                continue;
            }
            
            candidates.sort((a, b) => {
                if(a.count !== b.count) return b.count - a.count;
                return a.sum - b.sum;
            });
            
            for(let i = 0; i < candidates.length; i++) {
                let pair = candidates[i].pair;
                if(places[pair] === null) {
                    places[pair] = currentRank + i;
                }
            }
            
            let assignedPairs = new Set(candidates.map(c => c.pair));
            remaining = remaining.filter(p => !assignedPairs.has(p));
            currentRank += candidates.length;
        }
        
        for(let p = 0; p < couples; p++) {
            if(places[p] === null) places[p] = couples;
        }
        
        return places;
    }
    
    function applyBigSkating(pairGroup) {
        let allMarks = [];
        for(let p of pairGroup) {
            let marks = [];
            for(let d = 0; d < dances; d++) {
                for(let j = 0; j < judges; j++) {
                    let mark = danceScores[d][p][j];
                    if(mark !== null) marks.push(mark);
                }
            }
            allMarks.push(marks);
        }
        
        let totalVotes = judges * dances;
        let neededMajority = Math.floor(totalVotes / 2) + 1;
        let groupSize = pairGroup.length;
        let resultRanks = new Array(groupSize).fill(null);
        let remaining = [...Array(groupSize).keys()];
        let currentRank = 1;
        
        while(remaining.length > 0) {
            let candidates = [];
            for(let idx of remaining) {
                let marks = allMarks[idx];
                let countBetter = marks.filter(m => m <= currentRank).length;
                if(countBetter >= neededMajority) {
                    let sumComp = marks.filter(m => m <= currentRank).reduce((a, b) => a + b, 0);
                    candidates.push({ idx, count: countBetter, sum: sumComp });
                }
            }
            
            if(candidates.length === 0) {
                currentRank++;
                continue;
            }
            
            candidates.sort((a, b) => {
                if(a.count !== b.count) return b.count - a.count;
                return a.sum - b.sum;
            });
            
            for(let cand of candidates) {
                if(resultRanks[cand.idx] === null) {
                    resultRanks[cand.idx] = currentRank;
                    remaining = remaining.filter(r => r !== cand.idx);
                }
            }
            currentRank++;
        }
        
        return resultRanks;
    }
    
    function resolveTieWithUniquePlaces(groupPairs, dancePlacesArray) {
        let couplesCount = couples;
        let stats = [];
        
        for(let pair of groupPairs) {
            let eff = [];
            for(let limit = 1; limit <= couplesCount; limit++) {
                let count = 0;
                let sumComp = 0;
                for(let d = 0; d < dances; d++) {
                    let place = dancePlacesArray[d][pair];
                    if(place <= limit) {
                        count++;
                        sumComp += place;
                    }
                }
                eff.push({ limit, count, sumComp });
            }
            stats.push({ pair, eff });
        }
        
        stats.sort((a, b) => {
            for(let lim = 0; lim < couplesCount; lim++) {
                if(a.eff[lim].count !== b.eff[lim].count) {
                    return b.eff[lim].count - a.eff[lim].count;
                }
                if(a.eff[lim].sumComp !== b.eff[lim].sumComp) {
                    return a.eff[lim].sumComp - b.eff[lim].sumComp;
                }
            }
            return 0;
        });
        
        let result = new Array(groupPairs.length);
        let currentPlace = 1;
        let idx = 0;
        
        while(idx < stats.length) {
            let startIdx = idx;
            let endIdx = idx + 1;
            
            while(endIdx < stats.length) {
                let isEqual = true;
                for(let lim = 0; lim < couplesCount; lim++) {
                    if(stats[startIdx].eff[lim].count !== stats[endIdx].eff[lim].count ||
                       stats[startIdx].eff[lim].sumComp !== stats[endIdx].eff[lim].sumComp) {
                        isEqual = false;
                        break;
                    }
                }
                if(isEqual) endIdx++;
                else break;
            }
            
            let groupSize = endIdx - startIdx;
            if(groupSize === 1) {
                let originalIdx = groupPairs.indexOf(stats[startIdx].pair);
                result[originalIdx] = currentPlace;
                currentPlace++;
                idx = endIdx;
            } else {
                let equalPairs = stats.slice(startIdx, endIdx).map(s => s.pair);
                let bigSkatingRanks = applyBigSkating(equalPairs);
                let ranked = [];
                for(let k = 0; k < groupSize; k++) {
                    ranked.push({ pair: equalPairs[k], rank: bigSkatingRanks[k] });
                }
                ranked.sort((a, b) => a.rank - b.rank);
                for(let k = 0; k < groupSize; k++) {
                    let originalIdx = groupPairs.indexOf(ranked[k].pair);
                    result[originalIdx] = currentPlace + k;
                }
                currentPlace += groupSize;
                idx = endIdx;
            }
        }
        
        return result;
    }
    
    function computeFinalPlaces() {
        let dancePlaces = [];
        for(let d = 0; d < dances; d++) {
            dancePlaces.push(computeSingleDancePlaces(d));
        }
        
        let sumPlaces = new Array(couples).fill(0);
        for(let p = 0; p < couples; p++) {
            let total = 0;
            for(let d = 0; d < dances; d++) {
                total += dancePlaces[d][p];
            }
            sumPlaces[p] = total;
        }
        
        let pairsList = [];
        for(let p = 0; p < couples; p++) {
            pairsList.push({
                pair: p,
                sum: sumPlaces[p],
                dancePlaces: dancePlaces.map(d => d[p])
            });
        }
        
        pairsList.sort((a, b) => a.sum - b.sum);
        
        let finalPlaces = new Array(couples);
        let currentPlace = 1;
        let i = 0;
        
        while(i < couples) {
            let j = i;
            let groupSum = pairsList[i].sum;
            let group = [];
            while(j < couples && pairsList[j].sum === groupSum) {
                group.push(pairsList[j].pair);
                j++;
            }
            
            if(group.length === 1) {
                finalPlaces[group[0]] = currentPlace;
                currentPlace++;
            } else {
                let resolvedPlaces = resolveTieWithUniquePlaces(group, dancePlaces);
                for(let k = 0; k < group.length; k++) {
                    finalPlaces[group[k]] = resolvedPlaces[k];
                }
                currentPlace += group.length;
            }
            i = j;
        }
        
        let result = [];
        for(let p = 0; p < couples; p++) {
            result.push({
                pair: p + 1,
                place: finalPlaces[p]
            });
        }
        
        result.sort((a, b) => a.place - b.place);
        return result;
    }
    
    function displayResults() {
        let results = computeFinalPlaces();
        
        let html = '<ul class="results-list">';
        for(let r of results) {
            let placeEnding = getPlaceEnding(r.place);
            html += `<li><strong>${r.place}${placeEnding} место</strong> - пара №${r.pair}</li>`;
        }
        html += '</ul>';
        finalResultsList.innerHTML = html;
    }
    
    function getPlaceEnding(place) {
        if(place === 1) return '';
        if(place === 2) return '';
        if(place === 3) return '';
        return '';
    }
    
    function applyConfiguration() {
        let newJudges = parseInt(document.getElementById('judgesCount').value, 10);
        let newCouples = parseInt(document.getElementById('couplesCount').value, 10);
        let newDances = parseInt(document.getElementById('dancesCount').value, 10);
        
        if(isNaN(newJudges)) newJudges = 5;
        if(isNaN(newCouples)) newCouples = 6;
        if(isNaN(newDances)) newDances = 4;
        
        newJudges = Math.min(50, Math.max(1, newJudges));
        newCouples = Math.min(50, Math.max(2, newCouples));
        newDances = Math.min(12, Math.max(1, newDances));
        
        judges = newJudges;
        couples = newCouples;
        dances = newDances;
        if(currentDance >= dances) currentDance = 0;
        
        initDataStructure();
        renderHeader();
        renderTable();
        
        finalResultsList.innerHTML = '<p style="color: #6c86a3; text-align: center;">— введите оценки и нажмите «Рассчитать места» —</p>';
    }
    
    function resetAllScores() {
        for(let d = 0; d < dances; d++) {
            for(let p = 0; p < couples; p++) {
                for(let j = 0; j < judges; j++) {
                    danceScores[d][p][j] = null;
                }
            }
        }
        renderTable();
        finalResultsList.innerHTML = '<p style="color: #6c86a3; text-align: center;">— данные сброшены, введите оценки —</p>';
    }
    
    function prevDance() {
        if(currentDance > 0) {
            currentDance--;
            renderTable();
        }
    }
    
    function nextDance() {
        if(currentDance + 1 < dances) {
            currentDance++;
            renderTable();
        }
    }
    
    document.getElementById('applyConfigBtn').addEventListener('click', applyConfiguration);
    document.getElementById('resetAllScoresBtn').addEventListener('click', resetAllScores);
    document.getElementById('calculateFinalBtn').addEventListener('click', displayResults);
    document.getElementById('prevDanceBtn').addEventListener('click', prevDance);
    document.getElementById('nextDanceBtn').addEventListener('click', nextDance);
    
    initDataStructure();
    renderHeader();
    renderTable();
</script>
</body>
</html>
